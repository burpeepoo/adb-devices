name: Build packages

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  release:
    types:
      - published
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: macOS Apple Silicon
            os: macos-latest
            artifact_name: macos-aarch64-package
            build_command: |
              rustup target add aarch64-apple-darwin
              npm run build:dmg:apple
            artifact_path: |
              src-tauri/target/release/bundle/dmg/ADB_Manager_*_aarch64.dmg
          - name: macOS Intel
            os: macos-latest
            artifact_name: macos-x64-package
            build_command: |
              rustup target add x86_64-apple-darwin
              npm run build:dmg:intel
            artifact_path: |
              src-tauri/target/release/bundle/dmg/ADB_Manager_*_x64.dmg
          - name: Windows
            os: windows-latest
            artifact_name: windows-package
            build_command: npm run tauri build
            artifact_path: |
              src-tauri/target/release/bundle/nsis/*.exe
              src-tauri/target/release/bundle/msi/*.msi

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Prepare bundled scrcpy
        shell: bash
        run: bash scripts/prepare-scrcpy.sh

      - name: Build Tauri package
        run: ${{ matrix.platform.build_command }}

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform.artifact_name }}
          path: ${{ matrix.platform.artifact_path }}
          if-no-files-found: error
