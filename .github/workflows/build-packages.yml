name: Build packages

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  release:
    types:
      - published
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: macOS
            os: macos-latest
            artifact_name: macos-package
            artifact_path: |
              src-tauri/target/release/bundle/dmg/ADB_Manager_*_*.dmg
          - name: Windows
            os: windows-latest
            artifact_name: windows-package
            artifact_path: |
              src-tauri/target/release/bundle/nsis/*.exe
              src-tauri/target/release/bundle/msi/*.msi

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri package
        run: ${{ matrix.platform.name == 'macOS' && 'npm run build:dmg' || 'npm run tauri build' }}

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform.artifact_name }}
          path: ${{ matrix.platform.artifact_path }}
          if-no-files-found: error
